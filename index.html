<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="assets/logo.svg">
<title>Axiomake · 器象量化研究所</title>
<style>
/* ===== 马斯克系商业网站浅色基调：白底 · 近黑文字 · 大写字距标签 · 极简几何 ===== */
:root{
  --bg:#ffffff; --panel:#f7f7f7; --line:#e6e6e6; --text:#171a20; --dim:#5c5e62;
  --accent:#3e6ae1; --up:#0a8754; --down:#d3212c; --amber:#a06a00;
  --evA:#0a8754; --evB:#3e6ae1; --evC:#8a8d91;
  --font:"Segoe UI",-apple-system,BlinkMacSystemFont,Inter,Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.55}
.num{font-variant-numeric:tabular-nums}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

/* 顶部导航（Tesla/SpaceX 式：固定 · 白底 · 大写 · 字距） */
.topbar{position:fixed;top:0;left:0;right:0;z-index:50;height:56px;background:rgba(255,255,255,.92);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 20px;gap:18px}
.brand{font-size:16px;font-weight:800;letter-spacing:.22em;white-space:nowrap}
.brand small{display:block;font-size:9px;font-weight:400;letter-spacing:.12em;color:var(--dim)}
.topnav{display:flex;gap:2px;overflow-x:auto;flex:1;scrollbar-width:none}
.topnav::-webkit-scrollbar{display:none}
.nav-item{padding:6px 12px;border-radius:4px;cursor:pointer;font-size:12.5px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;color:var(--text);white-space:nowrap;user-select:none;transition:background .15s}
.nav-item:hover{background:rgba(23,26,32,.06)}
.nav-item.active{background:rgba(23,26,32,.09)}
.asof{font-size:11px;color:var(--dim);white-space:nowrap}

/* 主布局 */
.shell{max-width:1280px;margin:0 auto;padding:76px 20px 80px;display:flex;gap:26px;align-items:flex-start}
main{flex:1;min-width:0}
.pagehead{margin:6px 0 18px}
.pagehead h2{font-size:26px;font-weight:700;letter-spacing:-.01em}
#stale-banner{display:none;background:#fdf6e3;border:1px solid #eadfae;color:#6b5900;font-size:12.5px;
  padding:8px 14px;border-radius:6px;margin-bottom:14px}

/* 通用件 */
.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px 18px;margin-bottom:12px}
.card h3{font-size:15px;margin-bottom:8px;letter-spacing:.01em}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.16em;color:var(--dim);text-transform:uppercase;margin:22px 0 8px}
.eyebrow:first-child{margin-top:2px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{color:var(--dim);font-weight:600;text-align:left;padding:6px 8px;border-bottom:1px solid var(--line);white-space:nowrap;
  font-size:11px;letter-spacing:.08em;text-transform:uppercase}
td{padding:8px;border-bottom:1px solid var(--line);vertical-align:top}
tr:last-child td{border-bottom:none}
.chip{display:inline-block;font-size:11px;font-weight:700;padding:1px 8px;border-radius:3px;margin-right:4px}
.ev-A{background:rgba(10,135,84,.1);color:var(--evA)}
.ev-B{background:rgba(62,106,225,.1);color:var(--evB)}
.ev-C{background:rgba(138,141,145,.14);color:var(--evC)}
.sc{font-size:10.5px;color:var(--dim);border:1px solid var(--line);border-radius:3px;padding:0 4px;margin-left:4px;background:#fff}
.st{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.st.green{background:var(--up)}.st.yellow{background:#d9a514}.st.red,.st.fused{background:var(--down)}
.pos{color:var(--up)}.neg{color:var(--down)}
.mut{color:var(--dim);font-size:12.5px}
button,.btn{font-family:var(--font);background:var(--text);color:#fff;border:none;border-radius:4px;
  padding:9px 20px;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer}
button.ghost,.btn.ghost{background:transparent;color:var(--text);border:1px solid #c8c9cb}
button:focus-visible,.nav-item:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
input,select,textarea{font-family:var(--font);font-size:13px;border:1px solid #c8c9cb;border-radius:4px;
  padding:8px 10px;background:#fff;color:var(--text);width:100%}
label{font-size:11px;color:var(--dim);display:block;margin:8px 0 3px;letter-spacing:.08em;text-transform:uppercase}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.metric{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:12px 14px}
.metric .k{font-size:10.5px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase}
.metric .v{font-size:20px;font-weight:700;margin-top:3px}
.metric .s{font-size:11.5px;color:var(--dim);margin-top:3px}
.feed-item{padding:14px 2px;border-bottom:1px solid var(--line)}
.feed-item .t1{display:flex;gap:8px;align-items:baseline;flex-wrap:wrap}
.feed-item .date{font-size:12px;color:var(--dim)}
.feed-item .title{font-weight:700;font-size:14.5px;margin:3px 0}
.feed-item .body{font-size:13px;color:#3a3d42}
.gray-card{background:var(--panel);border:1px dashed #c8c9cb;border-radius:8px;padding:18px;color:var(--dim);
  font-size:13px;text-align:center;margin-bottom:12px}
pre.report{white-space:pre-wrap;font-family:ui-monospace,Consolas,monospace;font-size:12px;background:#fff;
  border:1px solid var(--line);border-radius:6px;padding:14px;max-height:480px;overflow:auto}
.phase{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}
.phase .ph{min-width:88px;font-weight:700;font-size:13px}
.phase .sp{min-width:150px;color:var(--dim);font-size:12px}
.phase .fx{flex:1;font-size:13px}
.edge-row td:first-child{white-space:nowrap;font-weight:600}
.rpt-row{display:flex;justify-content:space-between;align-items:center;padding:10px 4px;border-bottom:1px solid var(--line);cursor:pointer}
.rpt-row:hover{background:rgba(23,26,32,.03)}
.audit-row{padding:8px 2px;border-bottom:1px solid var(--line);font-size:12.5px}

/* 右栏 */
aside{width:320px;flex-shrink:0;position:sticky;top:76px}
.widget{background:var(--panel);border:1px solid var(--line);border-radius:8px;margin-bottom:14px;overflow:hidden}
.widget h4{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);padding:12px 16px 6px}
.mrow{display:flex;justify-content:space-between;align-items:center;padding:9px 16px;border-top:1px solid var(--line)}
.mrow .nm{font-size:12px;color:var(--dim)}
.mrow .pr{font-weight:700;font-size:14px}
.cd-row{display:flex;justify-content:space-between;padding:9px 16px;border-top:1px solid var(--line);font-size:13px}
.cd-row .d{font-weight:800}
.hl{padding:9px 16px;border-top:1px solid var(--line);font-size:11.5px;color:var(--dim)}

@media (max-width:1100px){aside{display:none}}
@media (max-width:780px){
  .shell{padding:118px 14px 60px}
  .topbar{flex-wrap:wrap;height:auto;padding:8px 14px}
  .asof{display:none}
  .grid2,.grid3{grid-template-columns:1fr}
}
@media (prefers-reduced-motion: reduce){*{transition:none!important}}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand" style="display:flex;align-items:center;gap:9px"><svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="-48 -48 96 96"><g><path d="M0 0 C 12.0 -8.5, 28.8 -4.7, 40 0 C 28.8 4.7, 12.0 8.5, 0 0 Z" fill="#3e6ae1" transform="rotate(-90)"/><path d="M0 0 C 10.2 -8.5, 24.5 -4.7, 34 0 C 24.5 4.7, 10.2 8.5, 0 0 Z" fill="#171a20" transform="rotate(-50)"/><path d="M0 0 C 12.6 -8.5, 30.2 -4.7, 42 0 C 30.2 4.7, 12.6 8.5, 0 0 Z" fill="#171a20" transform="rotate(-10)"/><path d="M0 0 C 10.8 -8.5, 25.9 -4.7, 36 0 C 25.9 4.7, 10.8 8.5, 0 0 Z" fill="#171a20" transform="rotate(30)"/><path d="M0 0 C 12.0 -8.5, 28.8 -4.7, 40 0 C 28.8 4.7, 12.0 8.5, 0 0 Z" fill="#171a20" transform="rotate(70)"/><path d="M0 0 C 9.9 -8.5, 23.8 -4.7, 33 0 C 23.8 4.7, 9.9 8.5, 0 0 Z" fill="#171a20" transform="rotate(110)"/><path d="M0 0 C 12.3 -8.5, 29.5 -4.7, 41 0 C 29.5 4.7, 12.3 8.5, 0 0 Z" fill="#171a20" transform="rotate(150)"/><path d="M0 0 C 10.5 -8.5, 25.2 -4.7, 35 0 C 25.2 4.7, 10.5 8.5, 0 0 Z" fill="#171a20" transform="rotate(190)"/><path d="M0 0 C 11.4 -8.5, 27.4 -4.7, 38 0 C 27.4 4.7, 11.4 8.5, 0 0 Z" fill="#171a20" transform="rotate(230)"/><circle r="5.5" fill="#171a20"/></g></svg><span>AXIOMAKE<small>器象量化研究所</small></span></div>
  <div class="topnav" id="nav"></div>
  <span class="asof num" id="asof"></span>
</div>

<div class="shell">
<main>
  <div class="pagehead"><h2 id="view-title">总览</h2></div>
  <div id="stale-banner"></div>
  <div id="view"></div>
</main>

<aside>
  <div class="widget" id="w-market"><h4>市场脉搏</h4></div>
  <div class="widget" id="w-count"><h4>事件倒计时</h4></div>
  <div class="widget" id="w-health"><h4>数据健康</h4></div>
</aside>
</div>

<script src="data.js"></script>
<script>
'use strict';
/* ============ 数据加载与自愈 ============ */
let D = null, DATA_OK = true;
try{
  D = window.MUSKINTEL_DATA;
  if(!D || !D.meta || !Array.isArray(D.ledger) || !Array.isArray(D.entities)) throw new Error('结构校验失败');
}catch(e){
  DATA_OK = false;
  document.getElementById('view').innerHTML =
    '<div class="gray-card">data.js 缺失或损坏（'+e.message+'）。处置：到 GitHub 仓库历史版本恢复 data.js（每次自动更新都有 git 提交，任意版本可回滚）。</div>';
}

/* ============ 用户存储（localStorage，随导出备份迁移） ============ */
const Store = {
  mem:{}, lsOK:false,
  init(){ try{ localStorage.setItem('__t','1'); localStorage.removeItem('__t'); this.lsOK=true; }catch(e){ this.lsOK=false; } },
  get(k,def){ if(this.lsOK){ try{ const v=localStorage.getItem('mi_'+k); return v?JSON.parse(v):def; }catch(e){return def;} } return (k in this.mem)?this.mem[k]:def; },
  set(k,v){ if(this.lsOK){ try{ localStorage.setItem('mi_'+k,JSON.stringify(v)); return; }catch(e){} } this.mem[k]=v; }
};
Store.init();

/* ============ 工具 ============ */
const esc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const evChip = ev => '<span class="chip ev-'+esc(ev)+'">'+esc(ev)+'级</span>';
const scTag = sc => '<span class="sc">'+esc(sc||'1y')+'</span>';
const today = () => new Date();
const fmtN = (n,d=2) => (n==null||isNaN(n)) ? '—' : Number(n).toLocaleString('en-US',{maximumFractionDigits:d});
function daysTo(dstr){ return Math.ceil((new Date(dstr+'T00:00:00') - today())/86400000); }
function dl(filename, text){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([text],{type:'text/plain;charset=utf-8'}));
  a.download=filename; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),2000);
}
function allLedger(){ return DATA_OK ? D.ledger.concat(Store.get('user_ledger',[])) : Store.get('user_ledger',[]); }

/* ============ 模块隔舱 ============ */
function guard(name, fn){
  try{ return fn(); }
  catch(e){ return '<div class="gray-card">【'+esc(name)+'】模块数据异常：'+esc(e.message)+'。其余模块不受影响。</div>'; }
}

/* ============ 视图 ============ */
const Views = {

feed(){ return guard('总览', () => {
  const rows = allLedger().slice().sort((a,b)=>b.ts.localeCompare(a.ts));
  let h = '<div class="eyebrow">事件账本（只追加 · '+rows.length+' 条 · 含承诺类 · A/B 进结论，C 级仅记录）</div>';
  h += rows.map(r=>{
    const p=r.payload||{};
    const imp = (p.impact!=null)?('<span class="'+(p.impact>0?'pos':p.impact<0?'neg':'mut')+' num"> 影响 '+(p.impact>0?'+':'')+p.impact+'</span>'):'';
    const srcLink = (p.srcs&&p.srcs[0]) ? ' · <a href="'+esc(p.srcs[0])+'" target="_blank" rel="noopener">原文↗</a>'
                  : (typeof p.src==='string'&&p.src.startsWith('http') ? ' · <a href="'+esc(p.src)+'" target="_blank" rel="noopener">原文↗</a>' : '');
    return '<div class="feed-item"><div class="t1"><span class="date num">'+esc(r.ts)+'</span>'+evChip(r.ev)+scTag(r.scope)+
      (r.type==='promise'?'<span class="chip" style="background:#fdf1d8;color:#8a6100">承诺</span>':'')+imp+'</div>'+
      '<div class="title">'+esc(r.title)+'</div>'+
      '<div class="body mut">'+esc(p.note||p.basis||'')+(p.src&&!String(p.src).startsWith('http')?(' · 来源: '+esc(p.src)):'')+srcLink+
      (p.status?(' · 状态: <b>'+esc(p.status)+'</b>'):'')+'</div></div>';
  }).join('');
  return h;
});},

graph(){ return guard('关系图谱', () => {
  const et = D.entities, ed = D.edges;
  const byId = Object.fromEntries(et.map(e=>[e.id,e]));
  const typeName = {person:'人物',company:'商业实体',absorbed:'已并入',family:'家族资本与根基',capital:'主权资本',political:'政治节点',regulator:'监管机构'};
  let h = '<div class="eyebrow">节点（商业实体 + 资本暗层 + 物理根基 三位一体 · '+et.length+' 个）</div><div class="grid3">';
  const groups = {};
  et.forEach(e=>{ (groups[e.type]=groups[e.type]||[]).push(e); });
  for(const t in groups){
    h += '<div class="card"><h3>'+esc(typeName[t]||t)+'</h3>'+groups[t].map(e=>'<div style="font-size:13px;padding:3px 0"><b>'+esc(e.name)+'</b><div class="mut">'+esc(e.note||e.status||'')+'</div></div>').join('')+'</div>';
  }
  h += '</div><div class="eyebrow">边（每条带类型/金额/日期/证据/来源 · '+ed.length+' 条）</div><div class="card"><table><tr><th>传导</th><th>类型</th><th>内容</th><th>证据</th></tr>';
  h += ed.map(e=>'<tr class="edge-row"><td>'+esc((byId[e.from]||{}).name||e.from)+' → '+esc((byId[e.to]||{}).name||e.to)+'</td><td>'+esc(e.kind)+'</td><td>'+esc(e.label)+(e.date?(' <span class="mut num">('+esc(e.date)+')</span>'):'')+'</td><td>'+evChip(e.ev)+'<div class="mut" style="font-size:11px">'+esc(e.src||'')+'</div></td></tr>').join('');
  h += '</table></div>';
  h += '<div class="card"><h3>核心传导链（点读版路径追踪）</h3><div style="font-size:13px;line-height:1.9">'+
    'Tesla —[$2B 优先股]→ xAI —[并入 0.1433 换股]→ SPCX ⇒ <b>TSLA 股东间接持有 SPCX 优先股权益</b><br>'+
    '中期选举(11-03) → 共和党保住 → FSD 联邦框架/合同扩张 → TSLA $350/股溢价支撑 · SPCX 政府线顺风<br>'+
    '中期选举(11-03) → 民主党翻盘 → NHTSA 调查升级 + 主权基金持股审查 + "美国党"期权可能重启 → 溢价压缩<br>'+
    '海湾资本(HUMAIN/QIA/MGX) → SPCX 股东 → CFIUS 审查敞口（随选举风向摆动）</div></div>';
  return h;
});},

political(){ return guard('政治与地缘', () => {
  const P = D.political;
  let h = '<div class="eyebrow">特马关系状态机（完整周期可回测）</div><div class="card">';
  h += P.machine.map(m=>'<div class="phase"><div class="ph">'+esc(m.phase)+'</div><div class="sp num">'+esc(m.span)+'</div><div class="fx"><b>'+esc(m.facts)+'</b><div class="mut">'+esc(m.implication)+'</div></div></div>').join('');
  h += '</div><div class="grid2"><div class="card"><h3>政治资本 · 资产端</h3>'+P.balance.assets.map(a=>'<div style="font-size:13px;padding:3px 0">· '+esc(a)+'</div>').join('')+'</div>';
  h += '<div class="card"><h3>政治资本 · 负债端</h3>'+P.balance.liabilities.map(a=>'<div style="font-size:13px;padding:3px 0">· '+esc(a)+'</div>').join('')+'</div></div>';
  h += '<div class="eyebrow">外部力量渗透与对冲</div><div class="card"><table><tr><th>力量</th><th>事实</th><th>风险</th></tr>'+
    P.external.map(x=>'<tr><td><b>'+esc(x.force)+'</b></td><td>'+esc(x.fact)+'</td><td>'+esc(x.risk)+'</td></tr>').join('')+'</table></div>';
  const dt = daysTo('2026-11-03');
  h += '<div class="card"><h3>头号二元期权：中期选举</h3><div class="num" style="font-size:26px;font-weight:800">'+dt+' 天</div><div class="mut">2026-11-03 · 共和党保住＝顺风延续；民主党翻盘＝监管反转＋"美国党"看跌期权可能重启（2025-07 暴跌剧本）。赛前情景树请在【决策与档案】页写死。</div></div>';
  return h;
});},

leading(){ return guard('先行引擎', () => {
  let h = '<div class="card"><h3>传导链视图</h3><div class="mut" style="font-size:13px">L1-L3（因：人才/专利/监管文件）→ L5-L6（资本与供应链确认）→ L7-L8（临近触发）→ 价格。<b>多层同红＝系统级预警；单层孤红＝观察。</b>资本流信号权重 ×3。</div></div>';
  D.leading.forEach(L=>{
    h += '<div class="eyebrow">第 '+L.layer+' 层 · '+esc(L.name)+'（先行 '+esc(L.lead)+'）</div><div class="card"><table><tr><th style="width:34%">指标</th><th>当前</th><th style="width:24%">来源</th></tr>';
    h += L.items.map(i=>'<tr><td><span class="st '+esc(i.st)+'"></span>'+esc(i.k)+'</td><td>'+esc(i.v)+'</td><td class="mut" style="font-size:11.5px">'+esc(i.src)+'</td></tr>').join('');
    h += '</table></div>';
  });
  h += '<div class="mut">边界规则：马斯克本人公开行程与公务机公开广播数据入库；私人家庭成员实时行踪无 A/B 级证据通道，按"无级不入库"规则出局。家族资本（家办/信托/990/教育/迁册）见【关系图谱】家族节点。</div>';
  return h;
});},

physics(){ return guard('物理与供需', () => {
  let h = '<div class="eyebrow">供需剪刀差总表（七产品线 · 状态翻转触发周报头条）</div><div class="card"><table><tr><th>产品线</th><th>状态</th><th>头号约束</th><th>解除时间表</th><th>投资含义</th></tr>';
  h += D.scissors.map(s=>'<tr><td><b>'+esc(s.line)+'</b><div class="mut" style="font-size:11px">盯: '+esc(s.watch)+'</div></td><td>'+esc(s.state)+'</td><td>'+esc(s.constraint)+'</td><td>'+esc(s.unlock)+'</td><td style="font-size:12px">'+esc(s.meaning)+'</td></tr>').join('');
  h += '</table></div><div class="mut" style="margin-bottom:10px">判读规则：供给约束＋高毛利＝扩产即增利（只盯产能）；需求约束＝降价换量毛利承压（只盯价格弹性）。混淆两态是头号亏损原因。</div>';
  h += '<div class="eyebrow">产品解剖台（七大代表产品 · 第一性原理×供应链）</div>';
  D.teardowns.forEach(t=>{
    h += '<div class="card"><h3>'+esc(t.name)+' <span class="mut" style="font-weight:400">· '+esc(t.role)+'</span></h3>'+
      '<div style="font-size:13px;margin-bottom:6px"><b>命门：</b>'+esc(t.core)+'</div>'+

/* ============ 报告页异步加载 ============ */
async function loadReports(){
  const box = document.getElementById('rpt-list'); if(!box) return;
  try{
    const r = await fetch('reports/index.json', {cache:'no-store'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const idx = await r.json();
    if(!idx.length){ box.innerHTML='<div class="mut">暂无报告。首个周报将在下个周日 06:30 自动生成；也可在 GitHub Actions 页手动 Run workflow 并填 force_report=weekly 立即补发。</div>'; return; }
    box.innerHTML = idx.map(e=>'<div class="rpt-row" onclick="openReport(\''+esc(e.path)+'\',\''+esc(e.title)+'\')"><span><b>'+esc(e.type)+'</b> · '+esc(e.date)+'</span><span class="mut">查看 →</span></div>').join('');
  }catch(e){
    box.innerHTML='<div class="mut">报告列表加载失败（'+esc(e.message)+'）。本页需通过网站地址访问（GitHub Pages）；直接双击本地 index.html 时浏览器禁止 fetch，属预期行为。</div>';
  }
}
async function openReport(path, title){
  const v = document.getElementById('rpt-view');
  v.innerHTML = '<div class="mut">加载中…</div>';
  try{
    const r = await fetch(path, {cache:'no-store'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const t = await r.text();
    v.innerHTML = '<div class="eyebrow">'+esc(title)+'</div><pre class="report">'+esc(t)+'</pre>'+
      '<div style="margin:8px 0 16px"><button class="ghost" onclick="dl(\''+esc(path.split('/').pop())+'\', window.__rptText)">下载 .md</button></div>';
    window.__rptText = t;
    v.scrollIntoView({behavior:'smooth'});
  }catch(e){ v.innerHTML = '<div class="gray-card">报告加载失败：'+esc(e.message)+'</div>'; }
}

/* ============ 交互动作 ============ */
function addEvent(){
  const ts=document.getElementById('f-ts').value, t=document.getElementById('f-title').value.trim();
  if(!ts||!t){ alert('日期与标题为必填'); return; }
  const uq=Store.get('user_ledger',[]);
  uq.push({id:'U'+Date.now(),type:'event',ts:ts,ev:document.getElementById('f-ev').value,scope:document.getElementById('f-sc').value,tags:[],title:t,payload:{impact:Number(document.getElementById('f-imp').value)||0,note:document.getElementById('f-note').value.trim(),src:'人工入库'}});
  Store.set('user_ledger',uq); render('decide');
}
function saveScen(){ Store.set('scenarios',document.getElementById('f-scen').value); alert('情景树已保存'); }
function saveNotes(){ Store.set('notes',document.getElementById('f-notes').value); alert('笔记已保存'); }
function addDecision(){
  const v=document.getElementById('f-dec').value.trim(); if(!v) return;
  const logs=Store.get('decisions',[]); logs.push({ts:new Date().toISOString().slice(0,10),txt:v,result:''});
  Store.set('decisions',logs); render('decide');
}
document.addEventListener('click',e=>{

  if(g){ const el=document.getElementById('pc-'+g.dataset.pid); if(el) el.scrollIntoView({behavior:'smooth'}); }
});
document.addEventListener('change',e=>{

    const logs=Store.get('decisions',[]); logs[Number(e.target.dataset.i)].result=e.target.value; Store.set('decisions',logs);

function genReport(days){
  const since=new Date(Date.now()-days*86400000).toISOString().slice(0,10);
  const rows=allLedger().filter(r=>r.ts>=since).sort((a,b)=>a.ts.localeCompare(b.ts));
  const kind='近'+days+'天即时报告';
  let md='# MuskIntel '+kind+' · '+new Date().toISOString().slice(0,10)+'\n\n## 区间事件（'+since+' 起 · '+rows.length+' 条）\n';
  md+=rows.map(r=>'- '+r.ts+' ['+r.ev+'/'+r.scope+'] '+r.title+((r.payload&&r.payload.impact)?(' (影响'+(r.payload.impact>0?'+':'')+r.payload.impact+')'):'' )).join('\n');
  md+='\n\n## 剪刀差状态\n'+D.scissors.map(s=>'- '+s.line+'：'+s.state+'（约束：'+s.constraint+'）').join('\n');
  md+='\n\n## 倒计时\n'+D.countdowns.map(c=>'- '+c.label+'：'+daysTo(c.date)+' 天（'+c.date+'）').join('\n');
  md+='\n\n---\n数据健康：'+JSON.stringify(D.health.sources)+'\n（对外发布版请手动删除原始行情数值）';
  document.getElementById('report-out').innerHTML='<pre class="report">'+esc(md)+'</pre><div style="margin-top:8px"><button class="ghost" onclick="dlReport()">下载 .md</button></div>';
  window.__lastReport={name:'Axiomake_即时_'+new Date().toISOString().slice(0,10)+'.md',text:md};
}
function dlReport(){ if(window.__lastReport) dl(window.__lastReport.name, window.__lastReport.text); }
function exportUser(){
  const pack={exported:new Date().toISOString(),user_ledger:Store.get('user_ledger',[]),notes:Store.get('notes',''),scenarios:Store.get('scenarios',''),decisions:Store.get('decisions',[])};
  dl('Axiomake_备份_'+new Date().toISOString().slice(0,10)+'.json', JSON.stringify(pack,null,2));
  Store.set('last_backup',new Date().toISOString().slice(0,10)); render('decide');
}
function importUser(ev){
  const f=ev.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{ const p=JSON.parse(r.result);
    if(p.user_ledger) Store.set('user_ledger',p.user_ledger);
    if(p.notes!=null) Store.set('notes',p.notes);
    if(p.scenarios!=null) Store.set('scenarios',p.scenarios);
    if(p.decisions) Store.set('decisions',p.decisions);
    alert('备份已导入'); render('decide');
  }catch(e){ alert('备份文件解析失败：'+e.message); } };
  r.readAsText(f,'utf-8');
}

/* ============ 导航与右栏 ============ */
const NAVS=[['feed','总览'],['graph','关系图谱'],['persons','人物网络'],['political','政治地缘'],['leading','先行引擎'],['physics','物理供需'],['techtree','技术树'],['market','市场资本'],['decide','决策档案'],['reports','报告']];
let ACTIVE='feed';
function render(id){
  ACTIVE=id;
  document.getElementById('view-title').textContent=NAVS.find(n=>n[0]===id)[1];
  document.getElementById('view').innerHTML=DATA_OK?Views[id]():'';
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.id===id));
  if(id==='reports') loadReports();
  window.scrollTo(0,0);
}
(function buildNav(){
  const nav=document.getElementById('nav');
  NAVS.forEach(([id,label])=>{
    const d=document.createElement('div'); d.className='nav-item'; d.dataset.id=id; d.tabIndex=0;
    d.textContent=label;
    d.onclick=()=>render(id);
    d.onkeydown=e=>{ if(e.key==='Enter'||e.key===' '){e.preventDefault();render(id);} };
    nav.appendChild(d);
  });
})();

(function buildAside(){
  if(!DATA_OK) return;
  const wm=document.getElementById('w-market');
  D.market.quotes.forEach(q=>{
    const chg=(q.chg==null)?'':'<span class="'+(q.chg>=0?'pos':'neg')+' num">'+(q.chg>=0?'+':'')+q.chg+'%</span>';
    wm.insertAdjacentHTML('beforeend','<div class="mrow"><div><div class="nm">'+esc(q.name)+(q.status!=='green'?' <span class="sc">陈旧</span>':'')+'</div><div class="pr num">'+(q.price!=null?('$'+fmtN(q.price)):esc(q.mcap||'—'))+'</div></div><div>'+chg+'</div></div>');
  });
  wm.insertAdjacentHTML('beforeend','<div class="hl num">快照 '+esc(D.market.asof)+' · 每日 06:30 自动更新 · 免费源延迟约15分钟</div>');
  const wc=document.getElementById('w-count');
  D.countdowns.forEach(c=>{
    const d=daysTo(c.date);
    wc.insertAdjacentHTML('beforeend','<div class="cd-row"><span>'+esc(c.label)+'</span><span class="d num" style="color:'+(d<=14?'var(--down)':d<=45?'var(--amber)':'var(--text)')+'">'+(d>=0?d+' 天':'已过')+'</span></div>');
  });
  const wh=document.getElementById('w-health');
  const names={yahoo:'Yahoo 行情',edgar:'SEC 文件',launchlib:'发射日程',rss:'新闻 RSS',stooq:'Stooq(退役)'};
  for(const k in D.health.sources){
    const v=D.health.sources[k];
    wh.insertAdjacentHTML('beforeend','<div class="mrow"><div class="nm"><span class="st '+esc(v)+'"></span>'+esc(names[k]||k)+'</div><div class="mut" style="font-size:11px">'+({green:'正常',yellow:'陈旧/待抓',red:'失败',fused:'熔断'}[v]||v)+'</div></div>');
  }
  wh.insertAdjacentHTML('beforeend','<div class="hl">最后抓取：'+esc(D.health.last_run)+' · 记录 '+D.ledger.length+' 条 · 模式 v'+D.meta.schema_version+'<br>个人研究工具 · 非投资建议 · 纪律：无证据等级不入库 · 尺度强制标注 · 结论可审计</div>');
})();

(function boot(){
  if(!DATA_OK) return;
  document.getElementById('asof').textContent='数据更新于 '+D.meta.generated_at.slice(0,16).replace('T',' ');
  const gen=new Date(D.meta.generated_at), ageDays=(Date.now()-gen)/86400000;
  const lb=Store.get('last_backup',null);
  const msgs=[];
  if(ageDays>2) msgs.push('数据已 '+Math.floor(ageDays)+' 天未更新——到 GitHub 仓库 Actions 页查看运行状态（正常应每天 06:30 自动跑）');
  if(lb){ const bd=(Date.now()-new Date(lb))/86400000; if(bd>7) msgs.push('批注备份已超过 7 天，请到【决策档案】导出备份'); }
  if(msgs.length){ const b=document.getElementById('stale-banner'); b.style.display='block'; b.textContent='⚠ '+msgs.join(' ｜ '); }
  render('feed');
})();
</script>
