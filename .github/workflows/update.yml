name: 自动更新数据与报告

on:
  schedule:
    - cron: '30 22 * * *'   # UTC 22:30 = 北京时间每天 06:30
  workflow_dispatch:         # 手动触发（Actions 页面点 Run workflow）
    inputs:
      force_report:
        description: '强制补发报告: weekly / monthly / quarterly / yearly（留空=不补发）'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 抓取 + 自动核实入库
        run: python scripts/update.py

      - name: 生成到期报告
        env:
          FORCE_REPORT: ${{ github.event.inputs.force_report }}
        run: python scripts/report.py

      - name: 提交变更
        run: |
          git config user.name "muskintel-bot"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "auto: 数据更新与报告 $(date -u +%F)"
          git push
